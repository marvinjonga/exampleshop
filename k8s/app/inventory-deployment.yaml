apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: exampleshop-prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: your-registry/exampleshop-inventory:latest
          ports:
            - containerPort: 8082
          env:
            - name: PORT
              value: "8082"
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          readinessProbe:
            httpGet:
              path: /ping
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: exampleshop-prod
spec:
  selector:
    app: inventory-service
  ports:
    - port: 8082
      targetPort: 8082