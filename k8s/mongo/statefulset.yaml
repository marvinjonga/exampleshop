apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: exampleshop-prod
spec:
  serviceName: mongo-service
  #3 replicas divided into 1 primary + 2 secondaries (replica set, not sharding yet —
  #you can alter the setup when traffic demands it)
  replicas: 3
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
          livenessProbe:
            exec:
              command: ['mongosh', '--eval', 'db.adminCommand("ping")']
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: mongo-storage
      spec:
        accessModes: ['ReadWriteOnce']
        resources:
          requests:
            storage: 10Gi